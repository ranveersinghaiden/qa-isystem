# ─────────────────────────────────────────────────────────────────────────────
# CI — strategy-service
#
# Triggers when code changes in:
#   • strategy-service/**   (the service itself)
#   • common/**             (shared library)
#   • .mvn/**               (Maven Central routing settings — affects all builds)
#   • pom.xml               (root BOM / parent version — affects all modules)
#   • .github/workflows/_service-build.yml
#   • .github/workflows/strategy-service-ci.yml
#
# Note: strategy-service is the most complex service (real GitHub PR creation,
# JavaCompiler-based test execution, RepoContextService, E2ECoverageAnalyzer).
# Its test suite covers 26 cases across StrategyAgent, ApiTestRunner, and RepoContext.
# ─────────────────────────────────────────────────────────────────────────────
name: CI — strategy-service

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - "strategy-service/**"
      - "common/**"
      - ".mvn/**"
      - "pom.xml"
      - ".github/workflows/_service-build.yml"
      - ".github/workflows/strategy-service-ci.yml"

  pull_request:
    branches:
      - main
      - master
      - develop
    paths:
      - "strategy-service/**"
      - "common/**"
      - ".mvn/**"
      - "pom.xml"

  workflow_dispatch:
    inputs:
      force-push:
        description: "Push Docker image even on a non-main branch?"
        required: false
        default: "false"
        type: boolean

jobs:
  build:
    name: strategy-service — Build, Test & Push
    uses: ./.github/workflows/_service-build.yml
    with:
      service: strategy-service
      port: 8082
      java-version: "25"
    secrets:
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

  notify-failure:
    name: Notify on failure
    needs: build
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Post failure notice to job summary
        run: |
          echo "## ❌ strategy-service CI FAILED on \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [build logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY

